<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="220" height="150" fill="url(#bg)" rx="6"/>

  <!-- Input image with segmentation regions -->
  <rect x="12" y="18" width="80" height="70" rx="4" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <!-- Sky region -->
  <rect x="13" y="19" width="78" height="22" rx="3" fill="#1a2744" opacity="0.9"/>
  <!-- Ground region -->
  <rect x="13" y="54" width="78" height="33" rx="3" fill="#1e3a1e" opacity="0.7"/>
  <!-- Object mask 1 -->
  <ellipse cx="38" cy="52" rx="14" ry="20" fill="#CEB888" opacity="0.25"/>
  <ellipse cx="38" cy="52" rx="14" ry="20" fill="none" stroke="#CEB888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Object mask 2 -->
  <ellipse cx="68" cy="48" rx="12" ry="18" fill="#ddd0a8" opacity="0.15"/>
  <ellipse cx="68" cy="48" rx="12" ry="18" fill="none" stroke="#ddd0a8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="52" y="100" text-anchor="middle" font-family="sans-serif" font-size="6.5" fill="#b8c9dc">Segmentation Masks</text>

  <!-- Arrow -->
  <line x1="96" y1="53" x2="110" y2="53" stroke="#CEB888" stroke-width="1.5"/>
  <polygon points="110,49 120,53 110,57" fill="#CEB888"/>

  <!-- TPU chip schematic -->
  <rect x="124" y="22" width="82" height="62" rx="4" fill="#1e293b" stroke="#CEB888" stroke-width="1"/>
  <!-- Grid of TPU cores -->
  <rect x="130" y="28" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <rect x="150" y="28" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <rect x="170" y="28" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <rect x="130" y="48" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <rect x="150" y="48" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <rect x="170" y="48" width="16" height="16" rx="2" fill="#263348" stroke="#CEB888" stroke-width="0.8"/>
  <!-- TF logo hint -->
  <text x="138" y="39" text-anchor="middle" font-family="monospace" font-size="7" fill="#CEB888">TF</text>
  <text x="158" y="39" text-anchor="middle" font-family="monospace" font-size="7" fill="#CEB888">TF</text>
  <text x="178" y="39" text-anchor="middle" font-family="monospace" font-size="7" fill="#CEB888">TF</text>
  <text x="138" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#b8c9dc">TF</text>
  <text x="158" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#b8c9dc">TF</text>
  <text x="178" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#b8c9dc">TF</text>
  <text x="165" y="96" text-anchor="middle" font-family="sans-serif" font-size="6.5" fill="#b8c9dc">TPU Cluster</text>

  <!-- Bottom -->
  <text x="110" y="114" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#b8c9dc">MaskFormer Replication</text>
  <text x="110" y="126" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">TensorFlow · TPU · Reproducibility</text>
</svg>
