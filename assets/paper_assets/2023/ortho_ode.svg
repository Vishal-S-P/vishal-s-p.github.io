<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="220" height="150" fill="url(#bg)" rx="6"/>

  <!-- Axes -->
  <line x1="20" y1="110" x2="200" y2="110" stroke="#2d3f5a" stroke-width="1"/>
  <line x1="20" y1="110" x2="20" y2="20" stroke="#2d3f5a" stroke-width="1"/>
  <polygon points="196,106 206,110 196,114" fill="#2d3f5a"/>
  <polygon points="16,24 20,14 24,24" fill="#2d3f5a"/>
  <text x="208" y="113" font-family="sans-serif" font-size="7" fill="#b8c9dc">t</text>
  <text x="12" y="14" font-family="sans-serif" font-size="7" fill="#b8c9dc">h</text>

  <!-- Standard ODE trajectory (dashed, perturbed) -->
  <path d="M 25 90 Q 60 40 100 70 Q 130 90 160 45 Q 180 25 195 55"
        stroke="#b8c9dc" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Ortho-ODE trajectory (smooth, robust) -->
  <path d="M 25 90 Q 80 75 120 65 Q 155 58 195 52"
        stroke="#CEB888" stroke-width="2.5" fill="none" opacity="0.95"/>

  <!-- Adversarial perturbation arrow -->
  <line x1="90" y1="60" x2="100" y2="73" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="2,2"/>
  <polygon points="97,73 103,78 101,68" fill="#ff6b6b" opacity="0.8"/>
  <text x="72" y="55" font-family="sans-serif" font-size="6" fill="#ff6b6b" opacity="0.9">δ (attack)</text>

  <!-- Legend -->
  <line x1="25" y1="125" x2="44" y2="125" stroke="#CEB888" stroke-width="2"/>
  <text x="47" y="128" font-family="sans-serif" font-size="6.5" fill="#b8c9dc">Ortho-ODE (robust)</text>
  <line x1="130" y1="125" x2="149" y2="125" stroke="#b8c9dc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="152" y="128" font-family="sans-serif" font-size="6.5" fill="#b8c9dc">Standard</text>

  <!-- Title -->
  <text x="110" y="143" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Neural ODEs · Adversarial Robustness</text>
</svg>
