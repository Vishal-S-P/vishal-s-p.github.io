<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="220" height="150" fill="url(#bg)" rx="6"/>

  <!-- Central model node -->
  <rect x="88" y="55" width="44" height="32" rx="5" fill="#263348" stroke="#CEB888" stroke-width="1.5"/>
  <text x="110" y="68" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Model</text>
  <text x="110" y="79" text-anchor="middle" font-family="monospace" font-size="6" fill="#b8c9dc">SSL</text>

  <!-- IoT device nodes -->
  <!-- Labeled device (left top) -->
  <rect x="14" y="18" width="36" height="26" rx="3" fill="#1e293b" stroke="#CEB888" stroke-width="1"/>
  <text x="32" y="30" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#CEB888">IoT₁</text>
  <text x="32" y="39" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#CEB888">labeled</text>
  <line x1="50" y1="31" x2="88" y2="65" stroke="#CEB888" stroke-width="1" opacity="0.7"/>

  <!-- Unlabeled device (left bottom) -->
  <rect x="14" y="88" width="36" height="26" rx="3" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <text x="32" y="100" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#b8c9dc">IoT₂</text>
  <text x="32" y="109" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#b8c9dc">unlabeled</text>
  <line x1="50" y1="101" x2="88" y2="80" stroke="#2d3f5a" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Labeled device (right top) -->
  <rect x="170" y="18" width="36" height="26" rx="3" fill="#1e293b" stroke="#CEB888" stroke-width="1"/>
  <text x="188" y="30" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#CEB888">IoT₃</text>
  <text x="188" y="39" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#CEB888">labeled</text>
  <line x1="170" y1="31" x2="132" y2="65" stroke="#CEB888" stroke-width="1" opacity="0.7"/>

  <!-- Unlabeled device (right bottom) -->
  <rect x="170" y="88" width="36" height="26" rx="3" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <text x="188" y="100" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#b8c9dc">IoT₄</text>
  <text x="188" y="109" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#b8c9dc">unlabeled</text>
  <line x1="170" y1="101" x2="132" y2="80" stroke="#2d3f5a" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Legend -->
  <line x1="30" y1="130" x2="46" y2="130" stroke="#CEB888" stroke-width="1.5"/>
  <text x="49" y="133" font-family="sans-serif" font-size="6" fill="#b8c9dc">Labeled</text>
  <line x1="100" y1="130" x2="116" y2="130" stroke="#2d3f5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="119" y="133" font-family="sans-serif" font-size="6" fill="#b8c9dc">Unlabeled</text>

  <!-- Label -->
  <text x="110" y="143" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Semi-Supervised · IoT · Industry</text>
</svg>
