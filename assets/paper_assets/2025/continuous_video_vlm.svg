<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CEB888;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ddd0a8;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="220" height="150" fill="url(#bg1)" rx="6"/>

  <!-- Video frames strip -->
  <rect x="12" y="20" width="42" height="32" rx="3" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <polygon points="27,28 27,44 40,36" fill="#CEB888" opacity="0.85"/>

  <rect x="60" y="20" width="42" height="32" rx="3" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <polygon points="75,28 75,44 88,36" fill="#CEB888" opacity="0.7"/>

  <rect x="108" y="20" width="42" height="32" rx="3" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <polygon points="123,28 123,44 136,36" fill="#CEB888" opacity="0.55"/>

  <!-- Arrow between frames and text -->
  <line x1="156" y1="36" x2="170" y2="36" stroke="#CEB888" stroke-width="1.5" opacity="0.6"/>
  <polygon points="170,32 178,36 170,40" fill="#CEB888" opacity="0.6"/>

  <!-- Language tokens box -->
  <rect x="180" y="20" width="32" height="32" rx="3" fill="#263348" stroke="#CEB888" stroke-width="1" opacity="0.8"/>
  <text x="196" y="31" text-anchor="middle" font-family="monospace" font-size="5" fill="#CEB888">"cat"</text>
  <text x="196" y="39" text-anchor="middle" font-family="monospace" font-size="5" fill="#b8c9dc">"runs"</text>
  <text x="196" y="47" text-anchor="middle" font-family="monospace" font-size="5" fill="#b8c9dc">"fast"</text>

  <!-- Continuous curve -->
  <path d="M 20 80 Q 60 65 100 80 Q 140 95 180 75" stroke="url(#gold1)" stroke-width="2" fill="none" stroke-dasharray="none"/>
  <circle cx="20" cy="80" r="3" fill="#CEB888"/>
  <circle cx="60" cy="70" r="3" fill="#CEB888" opacity="0.8"/>
  <circle cx="100" cy="80" r="3" fill="#CEB888"/>
  <circle cx="140" cy="88" r="3" fill="#CEB888" opacity="0.8"/>
  <circle cx="180" cy="75" r="3" fill="#CEB888"/>

  <!-- Label -->
  <text x="110" y="110" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#b8c9dc">Continuous Representations</text>
  <text x="110" y="122" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Video · Language · Alignment</text>

  <!-- Subtle grid lines -->
  <line x1="12" y1="98" x2="208" y2="98" stroke="#2d3f5a" stroke-width="0.5"/>
</svg>
