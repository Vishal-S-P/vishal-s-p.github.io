<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CEB888"/>
      <stop offset="100%" style="stop-color:#b89d6a"/>
    </linearGradient>
    <linearGradient id="imgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="220" height="150" fill="url(#bgGrad)" rx="6"/>

  <!-- === LEFT: Input Modalities === -->

  <!-- Image modality box -->
  <rect x="10" y="22" width="46" height="42" rx="4" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <!-- Simulated image inside: sky + mountain -->
  <rect x="13" y="25" width="40" height="36" rx="2" fill="url(#imgGrad)"/>
  <!-- mountain shape -->
  <polygon points="13,61 33,38 53,61" fill="#0f2340" opacity="0.8"/>
  <polygon points="25,61 38,44 53,61" fill="#0d1f38" opacity="0.9"/>
  <!-- sun -->
  <circle cx="44" cy="31" r="4" fill="#CEB888" opacity="0.85"/>
  <!-- label -->
  <text x="33" y="73" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" fill="#CEB888" font-weight="600">Image</text>

  <!-- Text modality box -->
  <rect x="10" y="82" width="46" height="42" rx="4" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <rect x="15" y="88" width="34" height="3" rx="1.5" fill="#4a6080"/>
  <rect x="15" y="94" width="28" height="3" rx="1.5" fill="#4a6080"/>
  <rect x="15" y="100" width="32" height="3" rx="1.5" fill="#4a6080"/>
  <rect x="15" y="106" width="20" height="3" rx="1.5" fill="#4a6080"/>
  <rect x="15" y="112" width="30" height="3" rx="1.5" fill="#4a6080"/>
  <text x="33" y="133" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" fill="#CEB888" font-weight="600">Text</text>

  <!-- Arrows input → model -->
  <line x1="57" y1="43" x2="74" y2="63" stroke="#CEB888" stroke-width="1.2" opacity="0.6" stroke-dasharray="3,2"/>
  <polygon points="74,63 69,58 72,56" fill="#CEB888" opacity="0.6"/>
  <line x1="57" y1="103" x2="74" y2="83" stroke="#CEB888" stroke-width="1.2" opacity="0.6" stroke-dasharray="3,2"/>
  <polygon points="74,83 69,88 72,90" fill="#CEB888" opacity="0.6"/>

  <!-- === CENTER: Reward Model === -->
  <rect x="75" y="42" width="70" height="62" rx="6" fill="#1e293b" stroke="#CEB888" stroke-width="1.5"/>

  <!-- Neural net nodes -->
  <!-- Layer 1 -->
  <circle cx="91" cy="57" r="5" fill="#263348" stroke="#CEB888" stroke-width="1"/>
  <circle cx="91" cy="73" r="5" fill="#263348" stroke="#CEB888" stroke-width="1"/>
  <circle cx="91" cy="89" r="5" fill="#263348" stroke="#CEB888" stroke-width="1"/>
  <!-- Layer 2 -->
  <circle cx="110" cy="63" r="5" fill="#263348" stroke="#b89d6a" stroke-width="1"/>
  <circle cx="110" cy="79" r="5" fill="#263348" stroke="#b89d6a" stroke-width="1"/>
  <!-- Layer 3 -->
  <circle cx="129" cy="73" r="6" fill="#CEB888" opacity="0.9"/>

  <!-- Connections L1→L2 -->
  <line x1="96" y1="57" x2="105" y2="63" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <line x1="96" y1="57" x2="105" y2="79" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <line x1="96" y1="73" x2="105" y2="63" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <line x1="96" y1="73" x2="105" y2="79" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <line x1="96" y1="89" x2="105" y2="63" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <line x1="96" y1="89" x2="105" y2="79" stroke="#CEB888" stroke-width="0.6" opacity="0.4"/>
  <!-- Connections L2→L3 -->
  <line x1="115" y1="63" x2="123" y2="73" stroke="#CEB888" stroke-width="0.8" opacity="0.6"/>
  <line x1="115" y1="79" x2="123" y2="73" stroke="#CEB888" stroke-width="0.8" opacity="0.6"/>

  <!-- Label -->
  <text x="110" y="99" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7.5" fill="#CEB888" font-weight="700">Reward Model</text>

  <!-- Arrow model → output -->
  <line x1="147" y1="73" x2="162" y2="73" stroke="#CEB888" stroke-width="1.5" opacity="0.8"/>
  <polygon points="162,73 157,70 157,76" fill="#CEB888" opacity="0.8"/>

  <!-- === RIGHT: Reward Score === -->
  <rect x="163" y="55" width="48" height="36" rx="5" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>

  <!-- Stars (rating) -->
  <text x="187" y="72" text-anchor="middle" font-family="serif" font-size="14" fill="#CEB888" filter="url(#glow)">★★★</text>

  <!-- Score bar -->
  <rect x="170" y="78" width="34" height="5" rx="2.5" fill="#263348"/>
  <rect x="170" y="78" width="28" height="5" rx="2.5" fill="url(#goldGrad)"/>

  <text x="187" y="101" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" fill="#CEB888" font-weight="600">Reward Score</text>

  <!-- Title -->
  <text x="110" y="140" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7.5" fill="#8a9bb5" letter-spacing="0.3">Multimodal Reward Models</text>
</svg>
