<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 150" width="220" height="150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="220" height="150" fill="url(#bg)" rx="6"/>

  <!-- Support set (few-shot examples) -->
  <text x="46" y="16" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#b8c9dc">Support Set (K-shot)</text>
  <rect x="10" y="20" width="22" height="22" rx="2" fill="#1e293b" stroke="#CEB888" stroke-width="1"/>
  <ellipse cx="21" cy="31" rx="7" ry="5" fill="#CEB888" opacity="0.4"/>
  <rect x="36" y="20" width="22" height="22" rx="2" fill="#1e293b" stroke="#CEB888" stroke-width="1"/>
  <ellipse cx="47" cy="31" rx="7" ry="5" fill="#CEB888" opacity="0.3"/>
  <rect x="62" y="20" width="22" height="22" rx="2" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <ellipse cx="73" cy="31" rx="7" ry="5" fill="#b8c9dc" opacity="0.2"/>

  <!-- Arrow down to meta-learner -->
  <line x1="46" y1="44" x2="46" y2="58" stroke="#CEB888" stroke-width="1.5"/>
  <polygon points="42,58 46,68 50,58" fill="#CEB888"/>

  <!-- Meta-learner box -->
  <rect x="14" y="68" width="64" height="32" rx="4" fill="#263348" stroke="#CEB888" stroke-width="1.5"/>
  <text x="46" y="82" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Meta-Learner</text>
  <text x="46" y="92" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#b8c9dc">MAML / Gradient</text>

  <!-- Gradient arrow -->
  <path d="M 78 84 Q 100 75 120 84" stroke="#CEB888" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="78" y1="84" x2="120" y2="84" stroke="#CEB888" stroke-width="1.5"/>
  <polygon points="120,80 130,84 120,88" fill="#CEB888"/>
  <text x="104" y="78" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#b8c9dc">∇θ adapt</text>

  <!-- Query prediction -->
  <rect x="134" y="24" width="72" height="88" rx="4" fill="#1e293b" stroke="#2d3f5a" stroke-width="1"/>
  <text x="170" y="38" text-anchor="middle" font-family="sans-serif" font-size="6.5" fill="#b8c9dc">Query Image</text>
  <rect x="142" y="42" width="56" height="40" rx="3" fill="#0f172a"/>
  <ellipse cx="170" cy="62" rx="18" ry="13" fill="#263348"/>
  <ellipse cx="170" cy="62" rx="9" ry="6" fill="#CEB888" opacity="0.35"/>
  <!-- Classification -->
  <text x="170" y="94" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#CEB888">Pneumonia ✓</text>
  <text x="170" y="104" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="#b8c9dc">few-shot prediction</text>

  <!-- Label -->
  <text x="110" y="126" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#b8c9dc">MetaMed: Few-Shot Medical Imaging</text>
  <text x="110" y="138" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#CEB888">Gradient-Based Meta-Learning</text>
</svg>
